services:
  gost-proxy:
    image: gogost/gost:latest
    container_name: proxy
    restart: unless-stopped
    
    command: -L=${PROXY_LOGIN}:${PROXY_PASSWORD}@:9000
    ports:
      - "9000:9000"

  xray:
    image: alpine:latest
    container_name: xray
    restart: unless-stopped
    ports:
      - "9010:9010"
    environment:
      - XRAY_CLIENT_ID=${XRAY_CLIENT_ID}
      - XRAY_PRIVATE_KEY=${XRAY_PRIVATE_KEY}
    volumes:
      # Монтируем шаблон xray.template.json
      - ./cfg/xray.template.json:/etc/xray/config.template.json:ro
    # Автоматически скачиваем оригинальный Xray с GitHub, подставляем ключи и запускаем!
    entrypoint: >
      sh -c "
      apk add --no-cache gettext curl unzip &&
      curl -L -o /tmp/xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip &&
      unzip -o /tmp/xray.zip -d /usr/local/bin/ &&
      envsubst < /etc/xray/config.template.json > /tmp/config.json &&
      exec /usr/local/bin/xray run -config /tmp/config.json
      "

  gost-tg-receiver:
    image: gogost/gost:latest
    container_name: gost-receiver
    restart: unless-stopped
    # Принимаем шифрованный shadowsocks-туннель на порту 9000 и пересылаем локально на telemt:9020
    command: -L=ss://chacha20-ietf-poly1305:${GOST_PASSWORD}@:9020 -F=tcp://telemt:9030
    ports:
      - "9020:9020"

  telemt:
    image: ghcr.io/telemt/telemt:latest
    container_name: telemt
    restart: unless-stopped

    ports:
      - "9030:9030"

    working_dir: /etc/telemt
    volumes:
      - ./cfg/telemt.toml:/etc/telemt/config.toml:ro
    tmpfs:
      - /etc/telemt:rw,mode=1777,size=4m
    environment:
      - RUST_LOG=info

    healthcheck:
      test: [ "CMD", "/app/telemt", "healthcheck", "/etc/telemt/config.toml", "--mode", "liveness" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    cap_drop:
      - ALL

    cap_add:
      - NET_BIND_SERVICE

    read_only: true

    security_opt:
      - no-new-privileges:true

    ulimits:
      nofile:
        soft: 65536
        hard: 262144

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  uptime-kuma:
    image: louislam/uptime-kuma:2
    container_name: uptime-kuma
    restart: always
    ports:
      - "9050:3001"
    volumes:
      - ./cfg/kuma:/app/data
    environment:
      - TZ=UTC  # Set the timezone
      - UMASK=0022  # Set your file permissions manually
    networks:
      - kuma_network  # add your own custom network config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001"]
      interval: 30s
      retries: 3
      start_period: 10s
      timeout: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  kuma_network:
    driver: bridge