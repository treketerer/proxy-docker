services:
  gost-proxy:
    image: gogost/gost:latest
    container_name: proxy
    restart: unless-stopped
    
    command: -L=proxy:20072007@:9000
    ports:
      - "9000:9000"

  xray:
    image: ghcr.io/xtls/xray-core:latest
    container_name: xray
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - ./cfg/xray.json:/etc/xray/config.json:ro
    command: ["run", "-config", "/etc/xray/config.json"]

