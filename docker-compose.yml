services:
  gost-proxy:
    image: gogost/gost:latest
    container_name: proxy
    restart: unless-stopped
    
    command: -L=proxy:20072007@:9000
    ports:
      - "9000:9000"

  mtg:
    image: nineseconds/mtg:2
    container_name: mtg-proxy
    restart: unless-stopped
    ports:
      - "2053:2053"
    volumes:
      - ./cfg/mtg-config.toml:/config.toml:ro 